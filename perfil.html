<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil de mascota · DS ID</title>
<style>
  :root{ --azul:#2c5aa0; --azul2:#4a90e2; --verde:#25d366; --rojo:#c0392b; --gris:#718096; --borde:#e8edf2; --bg:#eef3f8; }
  *{ margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body{ background:var(--bg); color:#1a202c; padding:16px; min-height:100vh; }
  .card{ max-width:480px; margin:0 auto; background:#fff; border-radius:20px; box-shadow:0 4px 24px rgba(0,0,0,.08); overflow:hidden; }
  .head{ background:linear-gradient(135deg,var(--azul2),var(--azul)); color:#fff; padding:24px 20px; text-align:center; }
  .badge{ display:inline-block; padding:4px 14px; background:rgba(255,255,255,.25); border-radius:999px; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:14px; }
  .avatar{ width:110px; height:110px; border-radius:50%; margin:0 auto 12px; border:4px solid #fff; background:#dbe9f7; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:52px; }
  .avatar img{ width:100%; height:100%; object-fit:cover; }
  .name{ font-size:26px; font-weight:700; margin-bottom:4px; }
  .greet{ font-size:14px; opacity:.92; margin-bottom:4px; }
  .meta{ font-size:13px; opacity:.85; }
  .alert{ background:#fdecec; border-bottom:1px solid #f5c6c6; padding:14px 18px; display:flex; gap:12px; align-items:flex-start; }
  .alert-t{ font-weight:600; color:var(--rojo); font-size:14px; }
  .alert-d{ color:#a23; font-size:13px; line-height:1.4; }
  .actions{ padding:18px; }
  .wa{ display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:16px; background:var(--verde); color:#fff; border:none; border-radius:14px; font-size:16px; font-weight:600; cursor:pointer; text-decoration:none; margin-bottom:10px; }
  .wa:hover{ background:#20bd5a; }
  .brow{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .bsec{ display:flex; align-items:center; justify-content:center; gap:6px; padding:13px; border:1.5px solid #d6e4f0; border-radius:12px; background:#fff; color:var(--azul); font-size:13px; font-weight:500; cursor:pointer; text-decoration:none; }
  .bsec:hover{ background:#f0f7ff; }
  .locmsg{ margin-top:12px; padding:12px; background:#e8f5e9; border-radius:10px; color:#2e7d32; font-size:12px; display:none; }
  .locmsg.show{ display:block; }
  .sections{ border-top:1px solid var(--borde); }
  .sec{ border-bottom:1px solid var(--borde); }
  .sh{ width:100%; padding:14px 18px; background:none; border:none; display:flex; justify-content:space-between; align-items:center; cursor:pointer; font-size:15px; font-weight:500; color:#2d3748; }
  .sh:hover{ background:#f7fafc; }
  .sb-body{ padding:0 18px 14px; font-size:13px; color:#4a5568; line-height:1.7; display:none; }
  .sec.open .sb-body{ display:block; }
  .sec.open .chev{ transform:rotate(180deg); }
  .chev{ transition:.2s; font-size:13px; }
  .dr{ display:flex; justify-content:space-between; padding:5px 0; }
  .dr span:first-child{ color:var(--gris); }
  .dr span:last-child{ color:#2d3748; font-weight:500; text-align:right; }
  .cc{ padding:10px 12px; background:#f7fafc; border-radius:10px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
  .cc:last-child{ margin-bottom:0; }
  .cn{ font-weight:600; font-size:14px; }
  .crel{ font-size:11px; color:var(--gris); }
  .cph{ font-size:12px; color:#4a5568; margin-top:2px; }
  .wamini{ width:38px; height:38px; background:var(--verde); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; text-decoration:none; flex-shrink:0; }
  .vr{ display:flex; justify-content:space-between; align-items:center; padding:6px 0; }
  .pill{ padding:3px 10px; border-radius:999px; font-size:11px; font-weight:500; }
  .pill-ok{ background:#e8f5e9; color:#2e7d32; }
  .pill-w{ background:#fff3e0; color:#e65100; }
  .note{ padding:10px 12px; background:#fef5e7; border-left:3px solid #f39c12; border-radius:6px; margin-top:8px; color:#7d5a00; font-size:12px; }
  .foot{ padding:18px; text-align:center; border-top:1px solid var(--borde); }
  .foot-b{ font-size:14px; font-weight:700; color:var(--azul); }
  .foot-t{ font-size:10px; color:#a0aec0; letter-spacing:1px; text-transform:uppercase; margin-top:2px; }
  .foot-s{ font-size:10px; color:#cbd5e0; margin-top:8px; }
  .loader{ text-align:center; padding:60px 20px; color:var(--gris); }
  .loader .sp{ width:32px; height:32px; border:3px solid #d6e0ea; border-top-color:var(--azul); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 14px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .err{ text-align:center; padding:50px 24px; }
  .err h2{ font-size:20px; color:#2d3748; margin-bottom:8px; }
  .err p{ color:var(--gris); font-size:14px; }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="loader" id="loader">
    <div class="sp"></div>
    Cargando perfil...
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="dsid-core.js"></script>
<script>
  /* ============================================================
     ⚙️  CONFIGURACIÓN — YA ESTÁ LISTA (mismos datos que registrar.html)
     ============================================================ */
  const SUPABASE_URL = "https://bwkjexxgbmuimphostxn.supabase.co";
  const SUPABASE_KEY = "sb_publishable_Hf-egqWEOiPiSs_fFR3eSQ_RFdHSZKg";
  /* ============================================================ */

  const params = new URLSearchParams(location.search);
  const id = params.get("id");

  (async function(){
    if (!id){ mostrarError("Código no especificado", "Esta página debe abrirse escaneando el QR de una mascota."); return; }
    if (SUPABASE_URL.indexOf("PEGA_AQUI") === 0){ mostrarError("Falta configurar", "Pega tus datos de Supabase en la sección CONFIGURACIÓN del archivo."); return; }

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data, error } = await sb.from("mascotas").select("*").eq("id", id).single();

    if (error || !data){ mostrarError("Mascota no encontrada", "El código no corresponde a ninguna mascota registrada."); return; }
    render(data);
  })();

  function mostrarError(titulo, msg){
    document.getElementById("card").innerHTML =
      '<div class="err"><div style="font-size:48px;margin-bottom:10px;">🐾</div><h2>'+DSID.escapeHtml(titulo)+'</h2><p>'+DSID.escapeHtml(msg)+'</p></div>';
  }

  function render(m){
    const e = DSID.escapeHtml;
    const edad = DSID.edadDesde(m.fecha_nacimiento);
    const metaPartes = [m.raza, m.sexo, edad].filter(Boolean).map(e).join(" · ");
    const avatar = m.foto_url
      ? '<img src="'+e(m.foto_url)+'" alt="Foto de '+e(m.nombre)+'">'
      : (m.especie === "Felina" ? "🐱" : "🐶");

    // Banner perdida
    const alerta = m.perdida ? (
      '<div class="alert"><span style="font-size:24px;">⚠️</span><div>'+
      '<div class="alert-t">Mascota perdida</div>'+
      '<div class="alert-d">Reportada como extraviada. Por favor contacta a su familia.</div></div></div>'
    ) : "";

    // Contacto principal
    const c1tel = m.dueno_telefono || "";
    const waPrincipal = DSID.buildWhatsApp(c1tel, m.nombre, "Estoy con "+(m.sexo==="Macho"?"él":"ella")+" en este momento.");

    // Contactos para la sección
    let contactosHtml = contactoCard(m.dueno_nombre, m.c1_relacion || "Dueño/a", c1tel, m.nombre, m.sexo);
    if (m.contacto2_nombre && m.contacto2_telefono){
      contactosHtml += contactoCard(m.contacto2_nombre, m.c2_relacion || "Contacto", m.contacto2_telefono, m.nombre, m.sexo);
    }

    // Vacunas
    const vacunas = [
      parseVacuna("Rabia", m.vacuna_rabia),
      parseVacuna("Polivalente", m.vacuna_polivalente),
      parseVacuna("Desparasitación", m.vacuna_despara)
    ].filter(Boolean).join("");

    // Salud (solo filas con datos)
    const saludRows = [
      m.esterilizada ? fila("Esterilizado/a", m.esterilizada) : "",
      m.alergias ? fila("Alergias", m.alergias) : "",
      m.medicacion ? fila("Medicación", m.medicacion) : ""
    ].join("");
    const compHtml = m.comportamiento ? '<div class="note">⚠️ '+e(m.comportamiento)+'</div>' : "";

    // Microchip
    const chipRows = [
      m.microchip ? '<div class="dr"><span>Número ISO</span><span style="font-family:monospace;font-size:11px;">'+e(m.microchip)+'</span></div>' : "",
      m.chip_vet ? fila("Implantado", m.chip_vet) : "",
      m.chip_fecha ? fila("Fecha", m.chip_fecha) : ""
    ].join("");

    let html =
    '<div class="head">'+
      '<div class="badge">Perfil de mascota</div>'+
      '<div class="avatar">'+avatar+'</div>'+
      '<div class="name">'+e(m.nombre)+'</div>'+
      '<div class="greet">¡Hola! Soy '+e(m.nombre)+'</div>'+
      (metaPartes ? '<div class="meta">'+metaPartes+'</div>' : '')+
    '</div>'+
    alerta+
    '<div class="actions">'+
      '<a href="'+waPrincipal+'" class="wa" target="_blank">'+iconWa()+' Contactar dueño por WhatsApp</a>'+
      '<div class="brow">'+
        '<a href="tel:'+e(c1tel)+'" class="bsec">📞 Llamar</a>'+
        '<button class="bsec" id="btnLoc" onclick="compartirUbicacion()">📍 Compartir ubicación</button>'+
      '</div>'+
      '<div class="locmsg" id="locMsg">✓ Ubicación enviada. La familia te contactará pronto.</div>'+
    '</div>'+
    '<div class="sections">'+
      seccion("ℹ️ Información general", true,
        [ fila("Nombre", m.nombre), m.especie?fila("Especie",m.especie):"", m.raza?fila("Raza",m.raza):"",
          m.sexo?fila("Sexo",m.sexo):"", m.fecha_nacimiento?fila("Nacimiento", fechaBonita(m.fecha_nacimiento)):"",
          m.ciudad?fila("Ciudad",m.ciudad):"" ].join("")
      )+
      seccion("📞 Contactos de emergencia", false, contactosHtml)+
      (saludRows||compHtml ? seccion("❤️ Información médica", false, saludRows+compHtml) : "")+
      (vacunas ? seccion("💉 Vacunas", false, vacunas) : "")+
      (chipRows ? seccion("🔍 Microchip", false, chipRows) : "")+
    '</div>'+
    '<div class="foot"><div class="foot-b">DS ID</div><div class="foot-t">Identificación Inteligente</div>'+
    '<div class="foot-s">Información suministrada por el dueño</div></div>';

    document.getElementById("card").innerHTML = html;

    // Guardamos datos para el botón de ubicación
    window._mascota = { nombre: m.nombre, whatsapp: c1tel, sexo: m.sexo };
  }

  // Helpers de render
  function fila(k,v){ return '<div class="dr"><span>'+DSID.escapeHtml(k)+'</span><span>'+DSID.escapeHtml(v)+'</span></div>'; }
  function seccion(titulo, abierta, contenido){
    return '<div class="sec'+(abierta?" open":"")+'">'+
      '<button class="sh" onclick="this.parentElement.classList.toggle(\'open\')">'+
      '<span>'+titulo+'</span><span class="chev">▼</span></button>'+
      '<div class="sb-body">'+contenido+'</div></div>';
  }
  function contactoCard(nombre, rel, tel, petName, sexo){
    const e = DSID.escapeHtml;
    const wa = DSID.buildWhatsApp(tel, petName);
    return '<div class="cc"><div><div class="cn">'+e(nombre)+'</div><div class="crel">'+e(rel)+'</div>'+
      '<div class="cph">'+e(DSID.prettyPhone(tel))+'</div></div>'+
      '<a href="'+wa+'" class="wamini" target="_blank">'+iconWa(20)+'</a></div>';
  }
  function parseVacuna(nombre, valor){
    if (!valor) return "";
    const e = DSID.escapeHtml;
    // Detecta si dice "próxima/pendiente/vencida" -> naranja; si no, verde
    const low = valor.toLowerCase();
    const warn = low.indexOf("próx")>=0 || low.indexOf("prox")>=0 || low.indexOf("pend")>=0 || low.indexOf("venc")>=0;
    return '<div class="vr"><span style="color:#718096;">'+e(nombre)+'</span>'+
      '<span class="pill '+(warn?"pill-w":"pill-ok")+'">'+e(valor)+'</span></div>';
  }
  function fechaBonita(iso){
    const meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    const d=new Date(iso); if(isNaN(d)) return iso;
    return d.getDate()+" "+meses[d.getMonth()]+" "+d.getFullYear();
  }
  function iconWa(size){ size=size||20; return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="currentColor"><path d="M17.6 6.32A7.85 7.85 0 0 0 12 4a7.94 7.94 0 0 0-6.76 12.05L4 21l5.06-1.22A7.94 7.94 0 0 0 12 19.94 7.94 7.94 0 0 0 17.6 6.32M12 18.52a6.6 6.6 0 0 1-3.36-.92l-.24-.14-2.5.6.65-2.42-.16-.25a6.59 6.59 0 0 1 10.18-8.11 6.55 6.55 0 0 1 1.95 4.7 6.6 6.6 0 0 1-6.52 6.54m3.58-4.93c-.2-.1-1.17-.58-1.35-.64s-.31-.1-.45.1-.51.64-.62.78-.23.15-.42.05a5.43 5.43 0 0 1-2.71-2.37c-.2-.35.2-.32.58-1.08a.36.36 0 0 0 0-.34c-.05-.1-.45-1.08-.62-1.48s-.33-.34-.45-.34h-.39a.74.74 0 0 0-.54.25 2.25 2.25 0 0 0-.7 1.66 3.88 3.88 0 0 0 .82 2.07A8.96 8.96 0 0 0 13 15.21c1.75.62 1.75.41 2.07.39a1.98 1.98 0 0 0 1.32-.93 1.63 1.63 0 0 0 .12-.93c-.05-.1-.18-.15-.38-.25"/></svg>'; }

  // Compartir ubicación real (GPS del navegador)
  function compartirUbicacion(){
    const btn = document.getElementById("btnLoc");
    const msg = document.getElementById("locMsg");
    if (!navigator.geolocation){ alert("Tu navegador no permite ubicación."); return; }
    btn.textContent = "⏳ Obteniendo...";
    btn.disabled = true;
    navigator.geolocation.getCurrentPosition(
      function(pos){
        const lat = pos.coords.latitude.toFixed(6);
        const lng = pos.coords.longitude.toFixed(6);
        const mapa = DSID.buildMaps(lat, lng);
        const mascota = window._mascota;
        const txt = "¡Encontré a "+mascota.nombre+"! Mi ubicación: "+mapa;
        const url = "https://wa.me/"+DSID.sanitizePhone(mascota.whatsapp)+"?text="+encodeURIComponent(txt);
        window.open(url, "_blank");
        btn.textContent = "✓ Ubicación enviada";
        btn.style.background = "#e8f5e9"; btn.style.color = "#2e7d32"; btn.style.borderColor = "#a5d6a7";
        msg.classList.add("show");
      },
      function(err){ alert("No se pudo obtener la ubicación: "+err.message); btn.textContent="📍 Compartir ubicación"; btn.disabled=false; }
    );
  }
</script>

</body>
</html>
