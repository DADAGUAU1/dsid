<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil de mascota · DS ID</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2032%2032%27%3E%3Crect%20width%3D%2732%27%20height%3D%2732%27%20rx%3D%278%27%20fill%3D%27%230F756B%27/%3E%3Cg%20fill%3D%27%23ffffff%27%3E%3Cellipse%20cx%3D%2716%27%20cy%3D%2720%27%20rx%3D%276%27%20ry%3D%275%27/%3E%3Ccircle%20cx%3D%279%27%20cy%3D%2713%27%20r%3D%272.4%27/%3E%3Ccircle%20cx%3D%2714%27%20cy%3D%2710%27%20r%3D%272.4%27/%3E%3Ccircle%20cx%3D%2719%27%20cy%3D%2710%27%20r%3D%272.4%27/%3E%3Ccircle%20cx%3D%2723%27%20cy%3D%2713%27%20r%3D%272.4%27/%3E%3C/g%3E%3C/svg%3E">
<meta name="theme-color" content="#0F756B">
<meta property="og:title" content="Perfil de mascota · DS ID">
<meta property="og:description" content="Si encontraste esta mascota, aquí puedes avisar a su familia al instante.">
<meta property="og:type" content="website">
<link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="wrap">
  <div class="card" id="card">
    <div class="loader" id="loader"><div class="sp"></div>Cargando perfil...</div>
  </div>
</div>

<script src="dsid-ui.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="dsid-core.js"></script>
<script>
  /* ============================================================
     ⚙️  CONFIGURACIÓN — YA ESTÁ LISTA
     ============================================================ */
  const SUPABASE_URL = "https://bwkjexxgbmuimphostxn.supabase.co";
  const SUPABASE_KEY = "sb_publishable_Hf-egqWEOiPiSs_fFR3eSQ_RFdHSZKg";
  /* ============================================================ */

  const params = new URLSearchParams(location.search);
  const id = params.get("id");

  (async function(){
    if (!id){ mostrarError("Falta el código", "Esta página se abre escaneando el QR de una mascota."); return; }
    if (SUPABASE_URL.indexOf("PEGA_AQUI") === 0){ mostrarError("Falta configurar", "Pega tus datos de Supabase en la sección CONFIGURACIÓN del archivo."); return; }
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data, error } = await sb.from("mascotas").select("*").eq("id", id).single();
    if (error || !data){ mostrarError("Mascota no encontrada", "El código no corresponde a ninguna mascota registrada."); return; }
    render(data);
  })();

  function mostrarError(titulo, msg){
    document.getElementById("card").innerHTML =
      '<div class="err"><div style="font-size:50px;margin-bottom:10px;">🐾</div><h2>'+DSID.escapeHtml(titulo)+'</h2><p>'+DSID.escapeHtml(msg)+'</p></div>';
  }

  function render(m){
    const e = DSID.escapeHtml;
    const edad = DSID.edadDesde(m.fecha_nacimiento);
    const chips = [m.raza, m.sexo, edad].filter(Boolean).map(x => '<span class="meta-chip">'+e(x)+'</span>').join("");
    const avatar = m.foto_url ? '<img src="'+e(m.foto_url)+'" alt="Foto de '+e(m.nombre)+'">' : (m.especie === "Felina" ? "🐱" : "🐶");

    const alerta = m.perdida ? (
      '<div class="alert"><span class="ic">⚠️</span><div>'+
      '<div class="alert-t">Mascota perdida</div>'+
      '<div class="alert-d">Reportada como extraviada. Por favor avísale a su familia.</div></div></div>'
    ) : "";

    const c1tel = m.dueno_telefono || "";
    const waPrincipal = DSID.buildWhatsApp(c1tel, m.nombre, "Estoy con "+(m.sexo==="Macho"?"él":"ella")+" en este momento.");

    let contactosHtml = contactoCard(m.dueno_nombre, m.c1_relacion || "Dueño/a", c1tel, m.nombre);
    if (m.contacto2_nombre && m.contacto2_telefono)
      contactosHtml += contactoCard(m.contacto2_nombre, m.c2_relacion || "Contacto", m.contacto2_telefono, m.nombre);

    const vacunas = [
      parseVacuna("Rabia", m.vacuna_rabia),
      parseVacuna("Polivalente", m.vacuna_polivalente),
      parseVacuna("Desparasitación", m.vacuna_despara)
    ].filter(Boolean).join("");

    const saludRows = [
      m.esterilizada ? fila("Esterilizado/a", m.esterilizada) : "",
      m.alergias ? fila("Alergias", m.alergias) : "",
      m.medicacion ? fila("Medicación", m.medicacion) : ""
    ].join("");
    const compHtml = m.comportamiento ? '<div class="note"><span>⚠️</span><span>'+e(m.comportamiento)+'</span></div>' : "";

    const chipRows = [
      m.microchip ? '<div class="dr"><span class="k">Número ISO</span><span class="v mono">'+e(m.microchip)+'</span></div>' : "",
      m.chip_vet ? fila("Implantado", m.chip_vet) : "",
      m.chip_fecha ? fila("Fecha", m.chip_fecha) : ""
    ].join("");

    let html =
    '<div class="profile-head">'+
      '<span class="badge badge-light" style="margin-bottom:14px;position:relative;z-index:1;">Perfil de mascota</span>'+
      '<div class="avatar">'+avatar+'</div>'+
      '<div class="name">'+e(m.nombre)+'</div>'+
      '<div class="greet">¡Hola! Soy '+e(m.nombre)+'</div>'+
      (chips ? '<div class="meta-row">'+chips+'</div>' : '')+
    '</div>'+
    alerta+
    '<div class="actions">'+
      '<a href="'+waPrincipal+'" class="wa" target="_blank">'+iconWa()+' Avísale a su familia</a>'+
      '<div class="brow">'+
        '<a href="tel:'+e(c1tel)+'" class="bsec">📞 Llamar</a>'+
        '<button class="bsec" id="btnLoc" onclick="compartirUbicacion()">📍 Enviar ubicación</button>'+
      '</div>'+
      '<div class="locmsg" id="locMsg">✓ Ubicación enviada. La familia te contactará pronto.</div>'+
    '</div>'+
    '<div class="sections">'+
      seccion("ℹ️", "Información general", true,
        [ fila("Nombre", m.nombre), m.especie?fila("Especie",m.especie):"", m.raza?fila("Raza",m.raza):"",
          m.sexo?fila("Sexo",m.sexo):"", m.fecha_nacimiento?fila("Nacimiento", fechaBonita(m.fecha_nacimiento)):"",
          m.ciudad?fila("Ciudad",m.ciudad):"" ].join("")
      )+
      seccion("📞", "Contactos de emergencia", false, contactosHtml)+
      (saludRows||compHtml ? seccion("❤️", "Información médica", false, saludRows+compHtml) : "")+
      (vacunas ? seccion("💉", "Vacunas", false, vacunas) : "")+
      (chipRows ? seccion("🔖", "Microchip", false, chipRows) : "")+
    '</div>'+
    '<div class="foot"><div class="foot-brand"><span class="dot"></span>DS ID</div>'+
    '<div class="foot-tag">Identificación inteligente</div>'+
    '<div class="foot-s">Información suministrada por su familia</div></div>';

    document.getElementById("card").innerHTML = html;
    window._mascota = { nombre: m.nombre, whatsapp: c1tel, sexo: m.sexo };
  }

  function fila(k,v){ return '<div class="dr"><span class="k">'+DSID.escapeHtml(k)+'</span><span class="v">'+DSID.escapeHtml(v)+'</span></div>'; }
  function seccion(ic, titulo, abierta, contenido){
    return '<div class="sec'+(abierta?" open":"")+'">'+
      '<button class="sh" onclick="this.parentElement.classList.toggle(\'open\')">'+
      '<span><span class="ic">'+ic+'</span> '+titulo+'</span><span class="chev">▼</span></button>'+
      '<div class="sb-body">'+contenido+'</div></div>';
  }
  function contactoCard(nombre, rel, tel, petName){
    const e = DSID.escapeHtml;
    const wa = DSID.buildWhatsApp(tel, petName);
    return '<div class="cc"><div><div class="cn">'+e(nombre)+'</div><div class="crel">'+e(rel)+'</div>'+
      '<div class="cph">'+e(DSID.prettyPhone(tel))+'</div></div>'+
      '<a href="'+wa+'" class="wamini" target="_blank" aria-label="WhatsApp">'+iconWa(20)+'</a></div>';
  }
  function parseVacuna(nombre, valor){
    if (!valor) return "";
    const e = DSID.escapeHtml, low = valor.toLowerCase();
    const warn = low.indexOf("próx")>=0||low.indexOf("prox")>=0||low.indexOf("pend")>=0||low.indexOf("venc")>=0;
    return '<div class="vr"><span class="k" style="color:var(--muted)">'+e(nombre)+'</span>'+
      '<span class="pill '+(warn?"pill-w":"pill-ok")+'">'+e(valor)+'</span></div>';
  }
  function fechaBonita(iso){
    const meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    const d=new Date(iso); if(isNaN(d)) return iso;
    return d.getDate()+" "+meses[d.getMonth()]+" "+d.getFullYear();
  }
  function iconWa(size){ size=size||20; return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="currentColor"><path d="M17.6 6.32A7.85 7.85 0 0 0 12 4a7.94 7.94 0 0 0-6.76 12.05L4 21l5.06-1.22A7.94 7.94 0 0 0 12 19.94 7.94 7.94 0 0 0 17.6 6.32M12 18.52a6.6 6.6 0 0 1-3.36-.92l-.24-.14-2.5.6.65-2.42-.16-.25a6.59 6.59 0 0 1 10.18-8.11 6.55 6.55 0 0 1 1.95 4.7 6.6 6.6 0 0 1-6.52 6.54m3.58-4.93c-.2-.1-1.17-.58-1.35-.64s-.31-.1-.45.1-.51.64-.62.78-.23.15-.42.05a5.43 5.43 0 0 1-2.71-2.37c-.2-.35.2-.32.58-1.08a.36.36 0 0 0 0-.34c-.05-.1-.45-1.08-.62-1.48s-.33-.34-.45-.34h-.39a.74.74 0 0 0-.54.25 2.25 2.25 0 0 0-.7 1.66 3.88 3.88 0 0 0 .82 2.07A8.96 8.96 0 0 0 13 15.21c1.75.62 1.75.41 2.07.39a1.98 1.98 0 0 0 1.32-.93 1.63 1.63 0 0 0 .12-.93c-.05-.1-.18-.15-.38-.25"/></svg>'; }

function compartirUbicacion() {

    const btn = document.getElementById("btnLoc");
    const msg = document.getElementById("locMsg");

    if (!navigator.geolocation) {
        DSIDUI.toast(
            "Tu navegador no permite compartir ubicación.",
            "err"
        );
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "⏳ Obteniendo ubicación...";

    navigator.geolocation.getCurrentPosition(

        (pos) => {

            const lat = pos.coords.latitude.toFixed(6);
            const lng = pos.coords.longitude.toFixed(6);

            const mascota = window._mascota;

            // Limpiar el número para WhatsApp
            const telefono = mascota.whatsapp.replace(/\D/g, "");

            // Enlace universal de Google Maps
            const mapsUrl = `https://maps.google.com/?q=${lat},${lng}`;

            const mensaje = `
🐾 ¡Encontré a ${mascota.nombre}!

📍 Esta es mi ubicación actual:
${mapsUrl}

Por favor comunícate conmigo.
            `.trim();

            // Compatible con móvil y escritorio
            const whatsappUrl =
                `https://api.whatsapp.com/send?phone=${telefono}&text=${encodeURIComponent(mensaje)}`;

            window.open(whatsappUrl, "_blank");

            btn.innerHTML = "✅ Ubicación preparada";
            btn.style.background = "var(--teal-tint)";
            btn.style.color = "var(--teal-deep)";
            btn.style.borderColor = "#A9D9D0";

            msg.classList.add("show");
        },

        (err) => {

            DSIDUI.toast(
                `No se pudo obtener la ubicación: ${err.message}`,
                "err"
            );

            btn.innerHTML = "📍 Enviar ubicación";
            btn.disabled = false;
        },

        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }
</script>

</body>
</html>
