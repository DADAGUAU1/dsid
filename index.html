<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS ID — Identificación Inteligente</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body{ background:linear-gradient(135deg,#4a90e2,#2c5aa0); color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .box{ background:rgba(255,255,255,.12); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.2); border-radius:24px; padding:40px 32px; max-width:380px; width:100%; text-align:center; }
  .logo{ font-size:56px; margin-bottom:10px; }
  h1{ font-size:30px; font-weight:800; letter-spacing:1px; margin-bottom:4px; }
  .tag{ font-size:13px; opacity:.85; letter-spacing:2px; text-transform:uppercase; margin-bottom:30px; }
  .btn{ display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:16px; border-radius:14px; font-size:16px; font-weight:600; text-decoration:none; margin-bottom:12px; transition:transform .15s, background .2s; }
  .btn-1{ background:#fff; color:#2c5aa0; }
  .btn-1:hover{ transform:translateY(-2px); }
  .btn-2{ background:rgba(255,255,255,.15); color:#fff; border:1.5px solid rgba(255,255,255,.4); }
  .btn-2:hover{ background:rgba(255,255,255,.25); transform:translateY(-2px); }
  .foot{ font-size:11px; opacity:.7; margin-top:20px; line-height:1.6; }
</style>
</head>
<body>
  <div class="box">
    <div class="logo">🐾</div>
    <h1>DS ID</h1>
    <div class="tag">Identificación Inteligente</div>
    <a href="mismascotas.html" class="btn btn-1">🔑 Soy dueño · Mi cuenta</a>
    <a href="registrar.html" class="btn btn-2">➕ Registro rápido</a>
    <a href="admin.html" class="btn btn-2">📋 Panel admin</a>
    <div class="foot">Placa inteligente con QR para mascotas<br>Si me pierdo, escanéame</div>
  </div>
</body>
</html>
