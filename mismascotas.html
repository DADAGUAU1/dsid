<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi mascota · DS ID</title>
<style>
  :root{ --azul:#2c5aa0; --azul2:#4a90e2; --verde:#1d9e75; --rojo:#c0392b; --gris:#718096; --borde:#d6e0ea; --bg:#eef3f8; }
  *{ margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body{ background:var(--bg); color:#1a202c; padding:16px; }
  .card{ max-width:520px; margin:0 auto; background:#fff; border-radius:18px; box-shadow:0 4px 24px rgba(0,0,0,.08); overflow:hidden; }
  .head{ background:linear-gradient(135deg,var(--azul2),var(--azul)); color:#fff; padding:18px 22px; display:flex; justify-content:space-between; align-items:center; }
  .head h1{ font-size:19px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .head .user{ font-size:12px; opacity:.9; text-align:right; }
  .head .user a{ color:#fff; text-decoration:underline; cursor:pointer; display:block; margin-top:2px; }
  .body{ padding:22px; }
  h2{ font-size:18px; margin-bottom:4px; }
  .muted{ color:var(--gris); font-size:13px; margin-bottom:18px; }
  label{ display:block; font-size:13px; color:#4a5568; margin-bottom:5px; font-weight:500; }
  input,select,textarea{ width:100%; padding:11px 12px; border:1.5px solid var(--borde); border-radius:10px; font-size:14px; margin-bottom:13px; background:#fff; color:#1a202c; }
  input:focus,select:focus,textarea:focus{ outline:none; border-color:var(--azul2); }
  textarea{ resize:vertical; min-height:54px; }
  .row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn{ width:100%; padding:14px; background:var(--azul); color:#fff; border:none; border-radius:11px; font-size:15px; font-weight:600; cursor:pointer; }
  .btn:hover{ background:#1e3f73; }
  .btn:disabled{ opacity:.6; cursor:not-allowed; }
  .btn-2{ background:#fff; color:var(--azul); border:1.5px solid var(--borde); margin-top:8px; }
  .btn-2:hover{ background:#f0f7ff; }
  .link{ text-align:center; font-size:13px; color:var(--azul); cursor:pointer; margin-top:14px; }
  .link:hover{ text-decoration:underline; }
  .msg{ padding:11px 13px; border-radius:9px; font-size:13px; margin-bottom:14px; }
  .msg-err{ background:#fdecec; color:#a02020; }
  .msg-ok{ background:#e8f5e9; color:#2e7d32; }
  .group-title{ font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--azul); font-weight:700; margin:18px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--borde); }
  .req{ color:var(--rojo); }
  .hint{ font-size:11px; color:var(--gris); margin-top:-9px; margin-bottom:13px; }
  /* Lista de mascotas */
  .pet{ border:1.5px solid var(--borde); border-radius:14px; padding:14px; margin-bottom:12px; display:flex; gap:14px; align-items:center; }
  .pet-av{ width:54px; height:54px; border-radius:50%; background:#dbe9f7; display:flex; align-items:center; justify-content:center; font-size:26px; overflow:hidden; flex-shrink:0; }
  .pet-av img{ width:100%; height:100%; object-fit:cover; }
  .pet-info{ flex:1; }
  .pet-name{ font-size:16px; font-weight:700; }
  .pet-sub{ font-size:12px; color:var(--gris); }
  .pet-lost{ display:inline-block; font-size:11px; padding:2px 8px; border-radius:999px; margin-top:4px; }
  .lost-yes{ background:#fdecec; color:var(--rojo); }
  .lost-no{ background:#e8f5e9; color:#2e7d32; }
  .pet-btns{ display:flex; flex-direction:column; gap:6px; }
  .mini{ padding:7px 12px; font-size:12px; border-radius:8px; border:1.5px solid var(--borde); background:#fff; color:var(--azul); cursor:pointer; text-decoration:none; text-align:center; white-space:nowrap; }
  .mini:hover{ background:#f0f7ff; }
  .foto-prev{ width:80px; height:80px; border-radius:50%; background:#dbe9f7; display:flex; align-items:center; justify-content:center; font-size:38px; overflow:hidden; margin:0 auto 10px; }
  .foto-prev img{ width:100%; height:100%; object-fit:cover; }
  .toggle-wrap{ display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:#fdf0f0; border:1px solid #f5c6c6; border-radius:10px; margin-bottom:13px; }
  .switch{ position:relative; width:46px; height:26px; flex-shrink:0; }
  .switch input{ opacity:0; width:0; height:0; }
  .slider{ position:absolute; inset:0; background:#cbd5e0; border-radius:26px; cursor:pointer; transition:.2s; }
  .slider:before{ content:""; position:absolute; width:20px; height:20px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
  input:checked + .slider{ background:var(--rojo); }
  input:checked + .slider:before{ transform:translateX(20px); }
  #qrbox{ text-align:center; margin:14px 0; }
  #qrbox canvas{ border:1px solid var(--borde); border-radius:12px; padding:10px; }
  .urlbox{ background:#f0f5fa; border-radius:8px; padding:10px 12px; font-family:monospace; font-size:11px; color:var(--azul); word-break:break-all; margin-bottom:12px; text-align:center; }
  .loader{ text-align:center; padding:50px 20px; color:var(--gris); }
  .sp{ width:30px; height:30px; border:3px solid var(--borde); border-top-color:var(--azul); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
  .spinner-inline{ display:inline-block; width:15px; height:15px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .warn{ background:#fff3cd; border:1px solid #ffe69c; color:#664d03; padding:12px 14px; border-radius:10px; font-size:13px; }
</style>
</head>
<body>

<div class="card">
  <div class="head">
    <h1>🐾 DS ID</h1>
    <div class="user" id="userBox"></div>
  </div>
  <div class="body" id="body">
    <div class="loader"><div class="sp"></div>Cargando...</div>
  </div>
</div>

  let sb = null, usuario = null, editandoId = null, fotoActual = "";
  const BASE = DSID.baseDir(location.href);
  const body = document.getElementById("body");
  const userBox = document.getElementById("userBox");

  if (SUPABASE_URL.indexOf("PEGA_AQUI") === 0){
    body.innerHTML = '<div class="warn">⚠️ Falta configurar Supabase en este archivo.</div>';
  } else {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    iniciar();
  }

  async function iniciar(){
    const { data } = await sb.auth.getSession();
    if (data.session){ usuario = data.session.user; verLista(); }
    else { verAuth(); }
  }

  /* ===================== AUTENTICACIÓN ===================== */
  function verAuth(modo){
    usuario = null; userBox.innerHTML = "";
    const esRegistro = modo === "registro";
    body.innerHTML =
      '<h2>'+(esRegistro?"Crear cuenta":"Iniciar sesión")+'</h2>'+
      '<p class="muted">'+(esRegistro?"Crea tu cuenta para registrar y administrar tus mascotas.":"Entra para ver y editar tus mascotas.")+'</p>'+
      '<div id="authMsg"></div>'+
      '<label>Correo electrónico</label>'+
      '<input type="email" id="email" placeholder="tucorreo@ejemplo.com">'+
      '<label>Contraseña</label>'+
      '<input type="password" id="pass" placeholder="Mínimo 6 caracteres">'+
      '<button class="btn" id="authBtn" onclick="'+(esRegistro?"hacerRegistro()":"hacerLogin()")+'">'+(esRegistro?"Crear cuenta":"Entrar")+'</button>'+
      '<div class="link" onclick="verAuth('+(esRegistro?'null':"'registro'")+')">'+(esRegistro?"¿Ya tienes cuenta? Inicia sesión":"¿No tienes cuenta? Créala aquí")+'</div>';
  }

  function authMsg(texto, tipo){
    document.getElementById("authMsg").innerHTML = '<div class="msg '+(tipo==="ok"?"msg-ok":"msg-err")+'">'+DSID.escapeHtml(texto)+'</div>';
  }
  function authLoading(txt){
    const b = document.getElementById("authBtn"); b.disabled = true; b.innerHTML = '<span class="spinner-inline"></span>'+txt;
  }

  async function hacerLogin(){
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("pass").value;
    if (!email || !pass){ authMsg("Escribe tu correo y contraseña."); return; }
    authLoading("Entrando...");
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error){ authMsg(traducirError(error.message)); verAuth(); return; }
    usuario = data.user; verLista();
  }

  async function hacerRegistro(){
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("pass").value;
    if (!email || !pass){ authMsg("Escribe tu correo y contraseña."); return; }
    if (pass.length < 6){ authMsg("La contraseña debe tener al menos 6 caracteres."); return; }
    authLoading("Creando cuenta...");
    const { data, error } = await sb.auth.signUp({ email, password: pass });
    if (error){ authMsg(traducirError(error.message)); verAuth("registro"); return; }
    if (data.session){ usuario = data.user; verLista(); }       // sin confirmación de correo
    else { authMsg("Cuenta creada. Revisa tu correo para confirmarla y luego inicia sesión.", "ok"); }
  }

  async function cerrarSesion(){
    await sb.auth.signOut();
    verAuth();
  }

  /* ===================== LISTA DE MASCOTAS ===================== */
  async function verLista(){
    userBox.innerHTML = DSID.escapeHtml(usuario.email) + '<a onclick="cerrarSesion()">Cerrar sesión</a>';
    body.innerHTML = '<div class="loader"><div class="sp"></div>Cargando tus mascotas...</div>';
    const { data, error } = await sb.from("mascotas").select("*").eq("dueno_id", usuario.id).order("created_at",{ascending:false});
    if (error){ body.innerHTML = '<div class="warn">Error: '+DSID.escapeHtml(error.message)+'</div>'; return; }

    let html = '<h2>Mis mascotas</h2><p class="muted">Aquí solo aparecen las tuyas. Nadie más puede verlas ni editarlas.</p>';
    if (!data || data.length === 0){
      html += '<p style="color:#718096;font-size:14px;margin-bottom:16px;">Todavía no has registrado ninguna mascota.</p>';
    } else {
      data.forEach(m => {
        const av = m.foto_url ? '<img src="'+DSID.escapeHtml(m.foto_url)+'">' : (m.especie==="Felina"?"🐱":"🐶");
        html += '<div class="pet">'+
          '<div class="pet-av">'+av+'</div>'+
          '<div class="pet-info"><div class="pet-name">'+DSID.escapeHtml(m.nombre)+'</div>'+
          '<div class="pet-sub">'+[DSID.escapeHtml(m.raza),DSID.escapeHtml(m.sexo)].filter(Boolean).join(" · ")+'</div>'+
          '<span class="pet-lost '+(m.perdida?"lost-yes":"lost-no")+'">'+(m.perdida?"🔴 Perdida":"🟢 En casa")+'</span></div>'+
          '<div class="pet-btns">'+
            '<button class="mini" onclick="editar(\''+DSID.escapeHtml(m.id)+'\')">✏️ Editar</button>'+
            '<button class="mini" onclick="verQR(\''+DSID.escapeHtml(m.id)+'\',\''+DSID.escapeHtml(m.nombre)+'\')">📱 Ver QR</button>'+
            '<a class="mini" href="'+DSID.profileUrl(BASE,m.id)+'" target="_blank">👁️ Perfil</a>'+
          '</div></div>';
      });
    }
    html += '<button class="btn" onclick="nuevaMascota()">➕ Registrar nueva mascota</button>';
    body.innerHTML = html;
  }

  /* ===================== VER / DESCARGAR QR ===================== */
  function verQR(id, nombre){
    const url = DSID.profileUrl(BASE, id);
    body.innerHTML =
      '<h2>QR de '+DSID.escapeHtml(nombre)+'</h2>'+
      '<p class="muted">Este es el código para imprimir en la marquilla.</p>'+
      '<div id="qrbox"></div>'+
      '<div class="urlbox">'+DSID.escapeHtml(url)+'</div>'+
      '<button class="btn" onclick="descargarQR(\''+DSID.escapeHtml(id)+'\',\''+DSID.escapeHtml(nombre)+'\')">⬇️ Descargar QR</button>'+
      '<button class="btn btn-2" onclick="verLista()">← Volver a mis mascotas</button>';
    const c = document.createElement("canvas");
    document.getElementById("qrbox").appendChild(c);
    QRCode.toCanvas(c, url, { errorCorrectionLevel:"H", margin:4, width:260, color:{dark:"#000",light:"#fff"} });
  }

  function descargarQR(id, nombre){
    const url = DSID.profileUrl(BASE, id);
    const tmp = document.createElement("canvas");
    QRCode.toCanvas(tmp, url, { errorCorrectionLevel:"H", margin:4, width:600, color:{dark:"#000",light:"#fff"} }, function(){
      const a = document.createElement("a");
      a.download = "qr-"+(nombre||"mascota").toLowerCase().replace(/\s+/g,"-")+".png";
      a.href = tmp.toDataURL("image/png"); a.click();
    });
  }

  /* ===================== FORMULARIO (crear / editar) ===================== */
  function nuevaMascota(){ editandoId = null; fotoActual = ""; verFormulario(null); }

  async function editar(id){
    body.innerHTML = '<div class="loader"><div class="sp"></div>Cargando...</div>';
    const { data, error } = await sb.from("mascotas").select("*").eq("id", id).single();
    if (error){ body.innerHTML = '<div class="warn">Error: '+DSID.escapeHtml(error.message)+'</div>'; return; }
    editandoId = id; fotoActual = data.foto_url || "";
    verFormulario(data);
  }

  function verFormulario(m){
    m = m || {};
    const v = (x)=> x ? DSID.escapeHtml(x) : "";
    const av = m.foto_url ? '<img src="'+DSID.escapeHtml(m.foto_url)+'">' : "🐶";
    body.innerHTML =
      '<h2>'+(editandoId?"Editar mascota":"Registrar mascota")+'</h2>'+
      '<div id="formMsg"></div>'+
      '<div class="group-title">Datos de la mascota</div>'+
      '<div class="foto-prev" id="fotoPrev">'+av+'</div>'+
      '<label>Foto (opcional)</label><input type="file" id="foto" accept="image/*">'+
      '<div class="hint">Si editas y no eliges otra, se conserva la actual.</div>'+
      '<label>Nombre <span class="req">*</span></label><input type="text" id="nombre" value="'+v(m.nombre)+'" placeholder="Ej: Nucita">'+
      '<div class="row"><div><label>Especie</label><select id="especie">'+opt(["Canina","Felina","Otra"],m.especie)+'</select></div>'+
      '<div><label>Sexo</label><select id="sexo">'+opt(["Hembra","Macho"],m.sexo)+'</select></div></div>'+
      '<label>Raza</label><input type="text" id="raza" value="'+v(m.raza)+'" placeholder="Ej: Border Collie">'+
      '<div class="row"><div><label>Nacimiento</label><input type="date" id="fechanac" value="'+v(m.fecha_nacimiento)+'"></div>'+
      '<div><label>Ciudad</label><input type="text" id="ciudad" value="'+v(m.ciudad)+'" placeholder="Ej: Pasto"></div></div>'+

      '<div class="group-title">Salud</div>'+
      '<div class="row"><div><label>¿Esterilizado/a?</label><select id="esterilizada">'+opt(["Sí","No","No sé"],m.esterilizada)+'</select></div>'+
      '<div><label>Alergias</label><input type="text" id="alergias" value="'+v(m.alergias)+'" placeholder="Ej: Ninguna"></div></div>'+
      '<label>Medicación</label><input type="text" id="medicacion" value="'+v(m.medicacion)+'" placeholder="Ej: Ninguna">'+
      '<label>Comportamiento</label><textarea id="comportamiento" placeholder="Ej: Asustadiza con extraños">'+v(m.comportamiento)+'</textarea>'+
      '<label>Vacunas</label><div class="row"><input type="text" id="vrabia" value="'+v(m.vacuna_rabia)+'" placeholder="Rabia: Vigente 2026">'+
      '<input type="text" id="vpoli" value="'+v(m.vacuna_polivalente)+'" placeholder="Polivalente: Vigente"></div>'+
      '<input type="text" id="vdespara" value="'+v(m.vacuna_despara)+'" placeholder="Desparasitación: Próxima junio">'+

      '<div class="group-title">Microchip (opcional)</div>'+
      '<label>Número ISO</label><input type="text" id="microchip" value="'+v(m.microchip)+'" placeholder="982000412345678">'+
      '<div class="row"><div><label>Veterinaria</label><input type="text" id="chipvet" value="'+v(m.chip_vet)+'"></div>'+
      '<div><label>Fecha</label><input type="text" id="chipfecha" value="'+v(m.chip_fecha)+'"></div></div>'+

      '<div class="group-title">Contactos</div>'+
      '<label>Contacto principal — Nombre <span class="req">*</span></label><input type="text" id="c1n" value="'+v(m.dueno_nombre)+'" placeholder="Tu nombre">'+
      '<div class="row"><div><label>Relación</label><input type="text" id="c1r" value="'+(v(m.c1_relacion)||"Dueño/a")+'"></div>'+
      '<div><label>Teléfono/WhatsApp <span class="req">*</span></label><input type="tel" id="c1t" value="'+v(m.dueno_telefono)+'" placeholder="3001234567"></div></div>'+
      '<label>Contacto secundario — Nombre</label><input type="text" id="c2n" value="'+v(m.contacto2_nombre)+'" placeholder="Opcional">'+
      '<div class="row"><div><label>Relación</label><input type="text" id="c2r" value="'+v(m.c2_relacion)+'" placeholder="Ej: Padre"></div>'+
      '<div><label>Teléfono/WhatsApp</label><input type="tel" id="c2t" value="'+v(m.contacto2_telefono)+'"></div></div>'+

      '<div class="group-title">Estado</div>'+
      '<div class="toggle-wrap"><div><div style="font-weight:600;font-size:14px;color:#7d2020;">Marcar como perdida</div>'+
      '<div style="font-size:12px;color:#a04040;">Muestra alerta roja al escanear</div></div>'+
      '<label class="switch"><input type="checkbox" id="perdida"'+(m.perdida?" checked":"")+'><span class="slider"></span></label></div>'+

      '<button class="btn" id="saveBtn" onclick="guardar()">'+(editandoId?"Guardar cambios":"Registrar y generar QR")+'</button>'+
      '<button class="btn btn-2" onclick="verLista()">← Cancelar</button>';

    document.getElementById("foto").addEventListener("change", function(e){
      const f = e.target.files[0]; if(!f) return;
      const r = new FileReader();
      r.onload = ev => document.getElementById("fotoPrev").innerHTML = '<img src="'+ev.target.result+'">';
      r.readAsDataURL(f);
    });
  }

  function opt(lista, sel){ return lista.map(o => '<option'+(o===sel?" selected":"")+'>'+o+'</option>').join(""); }
  function formMsg(t,tipo){ document.getElementById("formMsg").innerHTML = '<div class="msg '+(tipo==="ok"?"msg-ok":"msg-err")+'">'+DSID.escapeHtml(t)+'</div>'; }

  async function guardar(){
    const nombre = document.getElementById("nombre").value.trim();
    const c1n = document.getElementById("c1n").value.trim();
    const c1t = document.getElementById("c1t").value.trim();
    if (!nombre){ formMsg("El nombre es obligatorio."); return; }
    if (!c1n || !c1t){ formMsg("El contacto principal (nombre y teléfono) es obligatorio."); return; }

    const btn = document.getElementById("saveBtn"); btn.disabled = true;
    btn.innerHTML = '<span class="spinner-inline"></span>Guardando...';

    try {
      // Foto
      let fotoUrl = fotoActual;
      const fileInput = document.getElementById("foto");
      if (fileInput.files[0]){
        const file = fileInput.files[0];
        const ext = (file.name.split(".").pop()||"jpg").toLowerCase();
        const path = (editandoId || DSID.slugify(nombre)) + "-" + Date.now() + "." + ext;
        const up = await sb.storage.from("fotos").upload(path, file, { upsert:true });
        if (!up.error) fotoUrl = sb.storage.from("fotos").getPublicUrl(path).data.publicUrl;
      }

      const fila = {
        nombre: nombre,
        especie: document.getElementById("especie").value,
        raza: document.getElementById("raza").value.trim(),
        sexo: document.getElementById("sexo").value,
        fecha_nacimiento: document.getElementById("fechanac").value,
        ciudad: document.getElementById("ciudad").value.trim(),
        foto_url: fotoUrl,
        perdida: document.getElementById("perdida").checked,
        esterilizada: document.getElementById("esterilizada").value,
        alergias: document.getElementById("alergias").value.trim(),
        medicacion: document.getElementById("medicacion").value.trim(),
        comportamiento: document.getElementById("comportamiento").value.trim(),
        microchip: document.getElementById("microchip").value.trim(),
        chip_vet: document.getElementById("chipvet").value.trim(),
        chip_fecha: document.getElementById("chipfecha").value.trim(),
        dueno_nombre: c1n,
        dueno_telefono: c1t,
        dueno_whatsapp: DSID.sanitizePhone(c1t),
        contacto2_nombre: document.getElementById("c2n").value.trim(),
        contacto2_telefono: document.getElementById("c2t").value.trim(),
        contacto2_whatsapp: DSID.sanitizePhone(document.getElementById("c2t").value.trim()),
        vacuna_rabia: document.getElementById("vrabia").value.trim(),
        vacuna_polivalente: document.getElementById("vpoli").value.trim(),
        vacuna_despara: document.getElementById("vdespara").value.trim(),
        c1_relacion: document.getElementById("c1r").value.trim(),
        c2_relacion: document.getElementById("c2r").value.trim(),
        dueno_id: usuario.id
      };

      if (editandoId){
        const { error } = await sb.from("mascotas").update(fila).eq("id", editandoId);
        if (error) throw error;
        verLista();
      } else {
        fila.id = DSID.generateId(nombre);
        const { error } = await sb.from("mascotas").insert(fila);
        if (error) throw error;
        verQR(fila.id, nombre);
      }
    } catch(e){
      formMsg("Error al guardar: " + (e.message || e));
      btn.disabled = false; btn.innerHTML = editandoId ? "Guardar cambios" : "Registrar y generar QR";
    }
  }

  function traducirError(msg){
    const m = (msg||"").toLowerCase();
    if (m.includes("invalid login")) return "Correo o contraseña incorrectos.";
    if (m.includes("already registered") || m.includes("already been registered")) return "Ese correo ya tiene cuenta. Inicia sesión.";
    if (m.includes("email not confirmed")) return "Debes confirmar tu correo antes de entrar (revisa tu bandeja).";
    if (m.includes("password")) return "La contraseña no cumple los requisitos (mínimo 6 caracteres).";
    return msg;
  }
</script>

</body>
</html>
